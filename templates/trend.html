<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレンド - Choco-Tube-Plus</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f0f; color: #fff; margin: 0; }
        header { width: 100%; padding: 10px 0; background: #0f0f0f; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; display: flex; justify-content: center; }
        .nav-container { width: 95%; max-width: 1400px; display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ff0000; text-decoration: none; }
        .logo span { color: #fff; }
        .search-box { flex: 1; max-width: 600px; display: flex; border: 1px solid #333; border-radius: 40px; overflow: hidden; background: #121212; }
        input[type="text"] { flex: 1; border: none; background: transparent; color: #fff; padding: 8px 20px; outline: none; }
        .region-selector { padding: 20px; text-align: center; }
        .region-selector a { color: #aaa; text-decoration: none; margin: 0 10px; padding: 5px 15px; border-radius: 20px; border: 1px solid #333; }
        .region-selector a.active { background: #ff0000; color: #fff; border-color: #ff0000; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 20px; max-width: 1600px; margin: 0 auto; }
        .video-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.2s; }
        .video-card:hover { background: #2a2a2a; transform: translateY(-5px); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .info { padding: 12px; }
        .info h3 { margin: 0 0 8px 0; font-size: 1rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .info p { margin: 0; font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo">Choco-Tube<span>+</span></a>
            <form action="/search" method="get" style="flex:1; display:flex;">
                <div class="search-box">
                    <input type="text" name="q" placeholder="動画を検索..." required>
                    <button type="submit" style="background:#333; border:none; color:#fff; padding:0 15px; cursor:pointer;">検索</button>
                </div>
            </form>
        </div>
    </header>
    <main>
        <div class="region-selector">
            <a href="/trend?region=JP" class="{{ 'active' if region == 'JP' }}">日本</a>
            <a href="/trend?region=US" class="{{ 'active' if region == 'US' }}">アメリカ</a>
            <a href="/trend?region=GB" class="{{ 'active' if region == 'GB' }}">イギリス</a>
            <a href="/trend?region=KR" class="{{ 'active' if region == 'KR' }}">韓国</a>
        </div>
        <div class="video-grid">
            {% for video in results %}
            <a href="/watch/{{ video.id }}" class="video-card">
                <img src="{{ video.thumbnail }}" alt="{{ video.title }}" loading="lazy">
                <div class="info">
                    <h3>{{ video.title }}</h3>
                    <p>{{ video.channel }}</p>
                </div>
            </a>
            {% endfor %}
        </div>
    </main>
</body>
</html>
