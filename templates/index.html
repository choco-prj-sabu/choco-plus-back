<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choco-Tube-Plus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: #fff; margin: 0; }
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .logo { font-size: 3rem; font-weight: bold; color: #ff0000; margin-bottom: 2rem; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .logo span { color: #fff; }
        .search-container { width: 90%; max-width: 600px; background: #222; padding: 2rem; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .search-box { display: flex; width: 100%; border: 1px solid #333; border-radius: 40px; overflow: hidden; background: #121212; margin-bottom: 1rem; }
        input[type="text"] { flex: 1; border: none; background: transparent; color: #fff; padding: 12px 20px; outline: none; font-size: 1rem; }
        button { background: #333; border: none; color: #fff; padding: 0 25px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #444; }
        .options { display: flex; justify-content: center; gap: 20px; font-size: 0.9rem; color: #aaa; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">Choco-Tube<span>+</span></div>
        <div class="search-container">
            <form action="/search" method="get">
                <div class="search-box">
                    <input type="text" name="q" placeholder="動画を検索..." required>
                    <button type="submit">検索</button>
                </div>
                <div class="options">
                    <label><input type="radio" name="mode" value="inv_first" checked> Invidious優先</label>
                    <label><input type="radio" name="mode" value="yt_first"> YouTube API優先</label>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
