{% extends "base.html" %}

{% block title %}Choco-Tube{% endblock %}

{% block content %}
<div style="text-align: center; margin-top: 100px;">
    <h1 style="font-size: 3rem; color: #ff0000;">Choco<span>Tube</span></h1>
    <p style="color: #aaa; margin-bottom: 30px;">広告なしでYouTubeを楽しみましょう</p>
    
    <div style="max-width: 600px; margin: 0 auto; background: #222; padding: 30px; border-radius: 24px;">
        <form action="/search" method="get">
            <div class="search-form" style="margin-bottom: 15px;">
                <input type="text" name="q" placeholder="動画を検索" required>
                <button type="submit">検索</button>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; font-size: 0.9rem; color: #aaa;">
                <label><input type="radio" name="mode" value="inv_first" checked> Invidious優先</label>
                <label><input type="radio" name="mode" value="yt_first"> YouTube API優先</label>
            </div>
        </form>
    </div>
    
    <div style="margin-top: 50px;">
        <a href="/trend" style="display: inline-block; padding: 12px 30px; background: #ff0000; color: #fff; text-decoration: none; border-radius: 30px; font-weight: bold;">🔥 トレンドを見る</a>
    </div>
</div>
{% endblock %}
